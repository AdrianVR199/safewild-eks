# k8s/data-service.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: default
  labels:
    app: data-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      containers:
        - name: data-service
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/data-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5002
          env:
            - name: POSTGRES_HOST
              value: postgres          # K8s Service name
            - name: POSTGRES_PORT
              value: "5432"
          envFrom:
            - secretRef:
                name: postgres-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: default
spec:
  selector:
    app: data-service
  ports:
    - port: 5002
      targetPort: 5002
  type: ClusterIP
