# k8s/postgres-secret.yaml
# IMPORTANT: In production, use AWS Secrets Manager or Sealed Secrets.
# The values below are base64(visionai), base64(postgres), base64(securepassword123)
# Generate with: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: default
type: Opaque
data:
  POSTGRES_DB:       dmltaW9uYWk=       # visionai
  POSTGRES_USER:     cG9zdGdyZXM=       # postgres
  POSTGRES_PASSWORD: c2VjdXJlcGFzc3dvcmQxMjM=  # securepassword123
