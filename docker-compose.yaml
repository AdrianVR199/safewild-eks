services:

  # ── Base de datos ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: visionai-postgres
    environment:
      POSTGRES_DB:       visionai
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: securepassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 10
    networks:
      - visionai-net

  # ── Servicio de datos ──────────────────────────────────────
  data-service:
    build:
      context: ./data-service
    container_name: visionai-data
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     "5432"
      POSTGRES_DB:       visionai
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: securepassword123
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - visionai-net

  # ── Servicio de IA ─────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
    container_name: visionai-ai
    ports:
      - "5001:5001"
    networks:
      - visionai-net

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: visionai-frontend
    environment:
      AI_SERVICE_URL:   http://ai-service:5001
      DATA_SERVICE_URL: http://data-service:5002
    ports:
      - "5000:5000"
    depends_on:
      - ai-service
      - data-service
    networks:
      - visionai-net

volumes:
  postgres-data:

networks:
  visionai-net:
    driver: bridge